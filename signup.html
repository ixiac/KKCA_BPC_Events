<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="css/signup.css">
</head>

<body>
    <div class="container-fluid d-flex justify-content-center align-items-center">
        <div class="login-background border-1 shadow-lg text-center">
            <img src="images/login-BG.png" alt="Login Background" class="img-fluid login-bg-image mb-3">
            <div class="login-box container-fluid bg-white p-5 rounded">
                <h1 class="mb-3"><b>SIGN-UP</b></h1>
                <p class="fs-6">Have account? <a class="fs-6" href="#">Log-in</a></p>
                <form>
                    <div class="mb-3 row">
                        <div class="col-6 d-flex flex-column">
                            <label for="firstname" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstname" placeholder="First Name">
                        </div>
                        <div class="col-6 d-flex flex-column">
                            <label for="lastname" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastname" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="mb-3 row">
                        <div class="col-6 d-flex flex-column">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Username">
                        </div>
                        <div class="col-6 d-flex flex-column"">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Email">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                    <button type="submit" class="fs-5 btn btn-success">Sign-up</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
