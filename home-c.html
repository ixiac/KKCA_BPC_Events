<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Hub</title>
    <link rel="stylesheet" href="css/home-c.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<body>

                <img src="images/KKCA-logo.png" alt="Logo 1" class="logo">
                <img src="images/BPC-logo.png" alt="Logo 2" class="logo">
                <div class="logo-text">
                    <div>KKCA & BPC</div>
                    <div>Event Hub</div>
                </div>
                <div class="separator"></div>
            </div>
            <nav>
                <ul>
                    <li><a href="#explore">Explore</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div class="auth-buttons">
            <button class="signup">Sign-up</button>
            <button class="login">Login</button>
        </div>
    </header>

    <div class ="sidebar">
        <aside>
            <h2>Overview</h2>
                <ul>
                    <li><a href="#">Church Events</a></li>
                    <li><a href="#">View Events</a></li>
                    <li><a href="#">Booked Events</a></li>

                    <li><a href="#">Modify Events</a></li>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
