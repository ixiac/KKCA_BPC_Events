<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPC Event Portal</title>
    <link rel="stylesheet" href="css/home-cus.css">
</head>
<body>
    <header>
        <div class="left-container">
            <div class="logo-container">
                <img src="images/KKCA-logo.png" alt="Logo 1" class="logo">
                <img src="images/BPC-logo.png" alt="Logo 2" class="logo">
                <div class="logo-text">
                    <div>KKCA & BPC</div>
                    <div>Event Hub</div>
                </div>
                <div class="separator"></div>
            </div>
            <nav>
                <ul>
                    <li><a href="#explore">Explore</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div class="auth-buttons">
            <button class="signup">Sign-up</button>
            <button class="login">Login</button>
        </div>
    </header>

    <div class="main-container">
        <aside>
            <h2>Overview</h2>
            <ul>
                <li><a href="#">Church Events</a></li>
                <li><a href="#">View Events</a></li>
                <li><a href="#">Booked Events</a></li>
                <li><a href="#">Book More</a></li>
                <li><a href="#">Modify Events</a></li>
            </ul>
            <button class="signout-btn">Sign-out</button>
        </aside>

        <!-- Main Content -->
        <main>
            <!-- Event Booking Section -->
            <div class="event-booking">
                <h2>Book your events now!</h2>
                <img src="event-img.png" alt="Event">
                <button class="appointment-btn">Make an Appointment</button>
            </div>

            <!-- Event Stats Section -->
            <div class="event-stats">
                <div class="stat-box">
                    <h3>Booked Events: 0</h3>
                </div>
                <div class="stat-box">
                    <h3>Rescheduled Events: 0</h3>
                </div>
                <div class="stat-box">
                    <h3>Cancelled Events: 0</h3>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer>
        <div class="contact-info">
            <span>Phone</span> | <span>E-Mail</span> | <span>Facebook</span> | <span>More</span>
        </div>
    </footer>

</body>
</html>
